<!DOCTYPE html>
<html lang="pt-br">
<head>

  <title>Vault</title>
  <link rel="stylesheet" href="style.css">
</head>

<div class="app">

  <div class="header">

  <div class="cards" id="cards">

        <span class="icon">📸</span>
        <div>
          <h2>Instagram</h2>
          <p>@usuario</p>
        </div>
      </div>

      <div class="actions">
        <input type="password" value="senha123" class="password">
        <button class="show">👁</button>
        <button class="copy">📋</button>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
